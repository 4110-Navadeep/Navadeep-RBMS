services:
  # 1. MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: rbms-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Na150107
      MYSQL_DATABASE: resource_booking_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_db_data:/var/lib/mysql
      # Automatically runs the schema initialization on container start
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pNa150107" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Node.js Backend API Service
  backend:
    build: ./backend
    container_name: rbms-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=Na150107
      - DB_NAME=resource_booking_db
      - EMAIL_USER=donnaveeng@gmail.com
      - EMAIL_PASS=ytjh lwlj pqbn timj
      - JWT_SECRET=rbms_secret_session_token_key_123
    depends_on:
      mysql:
        condition: service_healthy

  # 3. React Frontend Static Service
  frontend:
    build: ./frontend
    container_name: rbms-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mysql_db_data:
